async function sha256Hex(text) {
  const buf = new TextEncoder().encode(text);
  const hash = await crypto.subtle.digest('SHA-256', buf);
  return Array.from(new Uint8Array(hash))
    .map((b) => b.toString(16).padStart(2, '0'))
    .join('');
}

// Normalise a 4-character secret (letter or digit, case-insensitive)
const normaliseSecret = (s) => (s || '').toLowerCase().replace(/[^a-z0-9]/g, '').slice(0, 4);
const isValidSecret = (s) => normaliseSecret(s).length === 4;
async function hashSecret(word) {
  return sha256Hex('secret:' + normaliseSecret(word));
}

/* ============================================================
   WEEK HELPERS
   ============================================================ */
function weeksInYear(year) {
  const firstDow = new Date(year, 0, 1).getDay();
  const lastDow = new Date(year, 11, 31).getDay();
  return firstDow === 4 || lastDow === 4 ? 53 : 52;
}

function getISOWeek(date = new Date()) {
  const d = new Date(date);
  d.setHours(0, 0, 0, 0);
  d.setDate(d.getDate() + 4 - (d.getDay() || 7));
  const yearStart = new Date(d.getFullYear(), 0, 1);
  const week = Math.ceil(((d - yearStart) / 86400000 + 1) / 7);
  return `${d.getFullYear()}-W${String(week).padStart(2, '0')}`;
}

function computeStreak(weekActivity, currentWeek) {
  const [yy, ww] = currentWeek.split('-W');
  let year = parseInt(yy, 10);
  let week = parseInt(ww, 10);
  let streak = 0;
  for (let i = 0; i < 260; i++) {
    const key = `${year}-W${String(week).padStart(2, '0')}`;
    const legacyKey = `${year}-W${week}`;
    if (weekActivity[key] || weekActivity[legacyKey]) {
      streak++;
      week--;
      if (week < 1) { year--; week = weeksInYear(year); }
    } else break;
  }
  return streak;
}

  { id: 'streak-2',           cat: 'streak',          label: '2 Week Streak',     emoji: '🔥',   target: 2,  stat: 'weekStreak' },
  { id: 'streak-4',           cat: 'streak',          label: '4 Week Streak',     emoji: '🔥🔥', target: 4,  stat: 'weekStreak' },
  { id: 'streak-8',           cat: 'streak',          label: 'On Fire!',          emoji: '🚀',   target: 8,  stat: 'weekStreak' },
];

const blankKidPrefs = () => ({
  ratings: {}, brave: {}, braveWeekByFood: {}, tried: {}, triedWeekByFood: {},
  weeklyPick: null, creations: [], weekActivity: {}, lastSeenWeek: null,
});

const blankGrownupPrefs = () => ({ creationRatings: {} });

const defaultConfig = () => ({
  kids: JSON.parse(JSON.stringify(DEFAULT_KIDS)),
  grownups: JSON.parse(JSON.stringify(DEFAULT_GROWNUPS)),
  foods: JSON.parse(JSON.stringify(DEFAULT_FOODS)),
  newFoods: JSON.parse(JSON.stringify(DEFAULT_NEW_FOODS)),
  ingredients: JSON.parse(JSON.stringify(DEFAULT_INGREDIENTS)),
  adminPasswordHash: null,
});

function allFoods(config) {
  return [...(config.foods.Breakfast || []), ...(config.foods.Lunch || []), ...(config.foods.Dinner || [])];
}

function computeStats(prefs, config, currentWeek) {
  const foods = allFoods(config);
  const byId = Object.fromEntries(foods.map((f) => [f.id, f]));
  const ratings = prefs.ratings || {};
  const brave = prefs.brave || {};
  const braveWeekByFood = prefs.braveWeekByFood || {};
  const tried = prefs.tried || {};
  const triedWeekByFood = prefs.triedWeekByFood || {};
  const creations = prefs.creations || [];

  const ratingsCount = Object.keys(ratings).length;
  const loves = Object.entries(ratings).filter(([, v]) => v === 'love').map(([k]) => k);
  const likesOrLoves = Object.entries(ratings).filter(([, v]) => v === 'love' || v === 'like').map(([k]) => k);
  const hasTag = (id, tag) => ((byId[id]?.tags) || []).includes(tag);

  const healthyLoves = loves.filter((id) => (byId[id]?.healthy ?? 0) >= 4).length;
  const vegLikes = likesOrLoves.filter((id) => byId[id]?.veg).length;
  const fishLiked = likesOrLoves.some((id) => hasTag(id, 'fish')) ? 1 : 0;
  const braveYes = Object.values(brave).filter((v) => v === 'yes').length;
  const actuallyTried = Object.keys(tried).length;
  const triedAndLoved = Object.values(tried).filter((v) => v === 'loved').length;
  const mealsCreated = creations.length;
  const categoriesHit = ['Breakfast', 'Lunch', 'Dinner'].filter((cat) =>
    (config.foods[cat] || []).some((f) => ratings[f.id])
  ).length;

  const colorSet = new Set();
  const colorTags = ['protein','grain','fruit','dairy','veggies','fish'];
  for (const id of loves) {
    for (const t of (byId[id]?.tags || [])) if (colorTags.includes(t)) colorSet.add(t);
    if (byId[id]?.veg) colorSet.add('veg-friendly');
  }

  return {
    ratingsCount,
    healthyLoves,
    vegLikes,
    fishLiked,
    categoriesHit,
    colorsLoved: colorSet.size,
    braveYes,
    actuallyTried,
    triedAndLoved,
    mealsCreated,
    weeklyVoted: prefs.weeklyPick && prefs.weeklyPick.week === currentWeek ? 1 : 0,
    weeklyBrave: Object.values(braveWeekByFood).includes(currentWeek) ? 1 : 0,
    weeklyTried: Object.values(triedWeekByFood).includes(currentWeek) ? 1 : 0,
    weeklyCreated: creations.some((c) => c.week === currentWeek) ? 1 : 0,
    weekStreak: computeStreak(prefs.weekActivity || {}, currentWeek),
  };
}

function computeStamps(prefs, config, currentWeek) {
  const stats = computeStats(prefs, config, currentWeek);
  return STAMPS.map((s) => {
    const v = stats[s.stat] || 0;
    return { ...s, earned: v >= s.target, progress: Math.min(v, s.target) };
  });
}

/* ============================================================
   ROOT APP
   ============================================================ */
function App() {
  const [loading, setLoading] = useState(true);
  const [config, setConfig] = useState(defaultConfig());
  const [kidPrefs, setKidPrefs] = useState({});        // { kidId: prefs }
  const [grownupPrefs, setGrownupPrefs] = useState({}); // { grownupId: prefs }
  const [view, setView] = useState('home');             // home | kid | grownup | admin
  const [activeKidId, setActiveKidId] = useState(null);
  const [activeGrownupId, setActiveGrownupId] = useState(null);
  const [toast, setToast] = useState(null);
  const [gate, setGate] = useState(null);               // { kind, targetId?, onSuccess }
  const currentWeek = getISOWeek();

  // Load everything on mount
  useEffect(() => {
    (async () => {
      let cfg = defaultConfig();
      try {
        const row = await storage.get('config:v1');
        if (row && row.value) {
          const parsed = JSON.parse(row.value);
          cfg = {
            kids: parsed.kids || DEFAULT_KIDS,
            grownups: parsed.grownups || DEFAULT_GROWNUPS,
            foods: parsed.foods || DEFAULT_FOODS,
            newFoods: parsed.newFoods || DEFAULT_NEW_FOODS,
            ingredients: parsed.ingredients || DEFAULT_INGREDIENTS,
            adminPasswordHash: parsed.adminPasswordHash || null,
          };
          // Migrate any kid without a pinHash field
          cfg.kids = cfg.kids.map((k) => ({ pinHash: null, ...k }));
          cfg.grownups = cfg.grownups.map((g) => ({ pinHash: null, ...g }));
        }
      } catch (e) {
        console.error('config load failed', e);
      }
      setConfig(cfg);

      // Load all prefs
      const kp = {};
      for (const k of cfg.kids) {
        kp[k.id] = blankKidPrefs();
        try {
          const row = await storage.get(`prefs:${k.id}`);
          if (row && row.value) kp[k.id] = { ...blankKidPrefs(), ...JSON.parse(row.value) };
        } catch (e) { /* ignore */ }
      }
      setKidPrefs(kp);

      const gp = {};
      for (const g of cfg.grownups) {
        gp[g.id] = blankGrownupPrefs();
        try {
          const row = await storage.get(`prefs:grownup:${g.id}`);
          if (row && row.value) gp[g.id] = { ...blankGrownupPrefs(), ...JSON.parse(row.value) };
        } catch (e) { /* ignore */ }
      }
      setGrownupPrefs(gp);

      setLoading(false);
    })();
  }, []);

  const saveConfig = async (newCfg) => {
    setConfig(newCfg);
    try {
      await storage.set('config:v1', JSON.stringify(newCfg));
    } catch (e) { console.error('config save failed', e); }
  };

  const saveKidPrefs = async (kidId, prefs) => {
    const updated = { ...prefs, weekActivity: { ...(prefs.weekActivity || {}), [currentWeek]: true }, lastSeenWeek: currentWeek };
    setKidPrefs((p) => ({ ...p, [kidId]: updated }));
    try { await storage.set(`prefs:${kidId}`, JSON.stringify(updated)); }
    catch (e) { console.error('prefs save failed', e); }
  };

  const saveGrownupPrefs = async (gid, prefs) => {
    setGrownupPrefs((p) => ({ ...p, [gid]: prefs }));
    try { await storage.set(`prefs:grownup:${gid}`, JSON.stringify(prefs)); }
    catch (e) { console.error('grownup prefs save failed', e); }
  };

  const showToast = (msg) => {
    setToast(msg);
    setTimeout(() => setToast(null), 1800);
  };

  // --- Kid actions ---
  const rate = (kidId, foodId, key) => {
    const p = kidPrefs[kidId] || blankKidPrefs();
    const ratings = { ...p.ratings };
    if (ratings[foodId] === key) delete ratings[foodId];
    else ratings[foodId] = key;
    saveKidPrefs(kidId, { ...p, ratings });
    const food = allFoods(config).find((f) => f.id === foodId);
    if (key === 'love' && (food?.healthy ?? 0) >= 4) showToast('⭐ Healthy hero move!');
    else if (key === 'love') showToast('💖 Love noted!');
  };

  const setBrave = (kidId, foodId, choice) => {
    const p = kidPrefs[kidId] || blankKidPrefs();
    const brave = { ...p.brave, [foodId]: choice };
    const braveWeekByFood = { ...(p.braveWeekByFood || {}) };
    if (choice === 'yes') braveWeekByFood[foodId] = currentWeek;
    else delete braveWeekByFood[foodId];
    saveKidPrefs(kidId, { ...p, brave, braveWeekByFood });
    if (choice === 'yes') showToast('🗺️ Stamp earned!');
  };

  const markTried = (kidId, foodId, choice) => {
    const p = kidPrefs[kidId] || blankKidPrefs();
    const tried = { ...p.tried, [foodId]: choice };
    const triedWeekByFood = { ...(p.triedWeekByFood || {}) };
    if (!triedWeekByFood[foodId]) triedWeekByFood[foodId] = currentWeek;
    saveKidPrefs(kidId, { ...p, tried, triedWeekByFood });
    showToast(choice === 'loved' ? '💖 New favourite!' : '👅 Stamp for trying!');
  };

  const pickWeekly = (kidId, mealId) => {
    const p = kidPrefs[kidId] || blankKidPrefs();
    const current = p.weeklyPick;
    const isSame = current && current.week === currentWeek && current.mealId === mealId;
    saveKidPrefs(kidId, { ...p, weeklyPick: isSame ? null : { week: currentWeek, mealId } });
  };

  const saveCreation = (kidId, creation) => {
    const p = kidPrefs[kidId] || blankKidPrefs();
    const next = { ...p, creations: [...(p.creations || []), { ...creation, id: uid(), createdAt: Date.now(), week: currentWeek }] };
    saveKidPrefs(kidId, next);
    showToast('👨‍🍳 Creation saved!');
  };

  const updateCreation = (kidId, creationId, patch) => {
    const p = kidPrefs[kidId] || blankKidPrefs();
    const next = { ...p, creations: (p.creations || []).map((c) => c.id === creationId ? { ...c, ...patch, updatedAt: Date.now() } : c) };
    saveKidPrefs(kidId, next);
    showToast('✏️ Creation updated!');
  };

  const deleteCreation = (kidId, creationId) => {
    const p = kidPrefs[kidId] || blankKidPrefs();
    const next = { ...p, creations: (p.creations || []).filter((c) => c.id !== creationId) };
    saveKidPrefs(kidId, next);
  };

  const resetKid = (kidId) => {
    saveKidPrefs(kidId, blankKidPrefs());
    showToast('✨ Fresh start!');
  };

  // --- Grown-up actions ---
  const rateCreation = (gid, kidId, creationId, patch) => {
    const gp = grownupPrefs[gid] || blankGrownupPrefs();
    const key = `${kidId}:${creationId}`;
    const existing = gp.creationRatings[key] || {};
    const next = { ...gp, creationRatings: { ...gp.creationRatings, [key]: { ...existing, ...patch, ratedAt: Date.now() } } };
    saveGrownupPrefs(gid, next);
  };

  const clearCreationRating = (gid, kidId, creationId) => {
    const gp = grownupPrefs[gid] || blankGrownupPrefs();
    const key = `${kidId}:${creationId}`;
    const next = { ...gp, creationRatings: { ...gp.creationRatings } };
    delete next.creationRatings[key];
    saveGrownupPrefs(gid, next);
  };

  // --- Gated navigation ---
  const openKid = (kid) => {
    if (!kid.pinHash) {
      // No secret set — go straight in
      setActiveKidId(kid.id); setView('kid'); return;
    }
    setGate({
      kind: 'kid',
      targetId: kid.id,
      onSuccess: () => { setActiveKidId(kid.id); setView('kid'); setGate(null); },
    });
  };

  const openGrownup = (g) => {
    if (!g.pinHash) {
      setActiveGrownupId(g.id); setView('grownup'); return;
    }
    setGate({
      kind: 'grownup',
      targetId: g.id,
      onSuccess: () => { setActiveGrownupId(g.id); setView('grownup'); setGate(null); },
    });
  };

  const openAdmin = () => {
    if (!config.adminPasswordHash) {
      // No admin password set — go straight in
      setView('admin'); return;
    }
    setGate({
      kind: 'admin',
      onSuccess: () => { setView('admin'); setGate(null); },
    });
  };

  if (loading) {
    return (
      <div className="paper-bg paper-texture min-h-screen flex items-center justify-center">
        <div className="text-5xl float-slow">🍽️</div>
      </div>
    );
  }

  const activeKid = config.kids.find((k) => k.id === activeKidId);
  const activeGrownup = config.grownups.find((g) => g.id === activeGrownupId);

  return (
    <div className="paper-bg paper-texture min-h-screen font-body text-stone-900 relative overflow-hidden">
      {/* Decorative floaters */}
      <div className="pointer-events-none absolute inset-0 overflow-hidden">
        <div className="absolute top-12 right-8 text-3xl opacity-30 float-slow">🌽</div>
        <div className="absolute bottom-24 left-6 text-3xl opacity-30 float-slow" style={{ animationDelay: '1s' }}>🍅</div>
        <div className="absolute top-1/3 left-4 text-2xl opacity-20 float-slow" style={{ animationDelay: '2s' }}>🥕</div>
        <div className="absolute bottom-8 right-10 text-2xl opacity-25 float-slow" style={{ animationDelay: '0.5s' }}>🫐</div>
      </div>

      {toast && (
        <div className="fixed top-8 left-0 right-0 z-50 flex justify-center pointer-events-none">
          <div className="pop-up bg-white chunky-shadow px-6 py-3 rounded-full font-display text-xl">{toast}</div>
        </div>
      )}

      <div className="relative max-w-3xl mx-auto px-4 py-6 md:py-10">
        {view === 'home' && (
          <HomeScreen
            config={config}
            kidPrefs={kidPrefs}
            grownupPrefs={grownupPrefs}
            currentWeek={currentWeek}
            onPickKid={openKid}
            onPickGrownup={openGrownup}
            onAdmin={openAdmin}
          />
        )}
        {view === 'kid' && activeKid && (
          <KidView
            kid={activeKid}
            config={config}
            prefs={kidPrefs[activeKid.id] || blankKidPrefs()}
            currentWeek={currentWeek}
            rate={(foodId, key) => rate(activeKid.id, foodId, key)}
            brave={(foodId, choice) => setBrave(activeKid.id, foodId, choice)}
            markTried={(foodId, choice) => markTried(activeKid.id, foodId, choice)}
            pickWeekly={(mealId) => pickWeekly(activeKid.id, mealId)}
            saveCreation={(c) => saveCreation(activeKid.id, c)}
            updateCreation={(id, patch) => updateCreation(activeKid.id, id, patch)}
            deleteCreation={(id) => deleteCreation(activeKid.id, id)}
            onBack={() => { setView('home'); setActiveKidId(null); }}
            onReset={() => resetKid(activeKid.id)}
          />
        )}
        {view === 'grownup' && activeGrownup && (
          <GrownupView
            grownup={activeGrownup}
            config={config}
            grownupPrefs={grownupPrefs[activeGrownup.id] || blankGrownupPrefs()}
            kidPrefs={kidPrefs}
            onRate={(kidId, creationId, patch) => rateCreation(activeGrownup.id, kidId, creationId, patch)}
            onClear={(kidId, creationId) => clearCreationRating(activeGrownup.id, kidId, creationId)}
            onBack={() => { setView('home'); setActiveGrownupId(null); }}
          />
        )}
        {view === 'admin' && (
          <AdminPanel
            config={config}
            kidPrefs={kidPrefs}
            grownupPrefs={grownupPrefs}
            currentWeek={currentWeek}
            saveConfig={saveConfig}
            onBack={() => setView('home')}
            onToast={showToast}
          />
        )}
      </div>

      {gate && (
        <Gate
          kind={gate.kind}
          config={config}
          targetId={gate.targetId}
          onCancel={() => setGate(null)}
          onSuccess={gate.onSuccess}
          saveConfig={saveConfig}
          onToast={showToast}
        />
      )}
    </div>
  );
}

        <div className="inline-block relative mb-3">

          <h1 className="font-display font-black text-5xl md:text-7xl leading-none" style={{ color: '#7c2d12' }}>Family</h1>

          </div>
          <div className="flex flex-wrap gap-3 justify-center">
            {config.grownups.map((g) => {
              const gp = grownupPrefs[g.id] || blankGrownupPrefs();
              const rated = Object.keys(gp.creationRatings || {}).length;
              return (
                <button
                  key={g.id}

                >
                  <div className="text-3xl">{g.emoji}</div>

                    <div className="font-display font-black text-lg leading-none" style={{ color: g.deep }}>{g.name}</div>
                    <div className="font-body text-xs text-stone-500 mt-0.5">{rated} rated</div>
                  </div>

      <div className="flex justify-center">
        <button
          onClick={onAdmin}

          style={{ border: '2px solid #44403c', color: '#44403c' }}
        >
          <Settings className="w-4 h-4" /> Grown-up admin <ExternalLink className="w-3.5 h-3.5 opacity-60" />
        </button>
      </div>
    </div>
  );
}

/* ============================================================
   WORD PAD (4-letter secret entry)
   ============================================================ */
function WordPad({ color = '#059669', deep = '#064e3b', soft = '#d1fae5', length = 4, onComplete, error, onClear, showPreview = true }) {
  const [word, setWord] = useState('');
  const [wrong, setWrong] = useState(false);
  const hasCompleted = useRef(false);

  useEffect(() => {
    if (error) {
      setWrong(true);
      const t = setTimeout(() => { setWord(''); setWrong(false); hasCompleted.current = false; }, 500);
      return () => clearTimeout(t);
    }
  }, [error]);

  const press = (letter) => {
    if (word.length >= length) return;
    const next = word + letter;
    setWord(next);
    if (next.length === length && !hasCompleted.current) {
      hasCompleted.current = true;
      setTimeout(() => onComplete(next), 120);
    }
  };

  const back = () => {
    setWord((w) => w.slice(0, -1));
    hasCompleted.current = false;
    onClear && onClear();
  };

  const clear = () => { setWord(''); hasCompleted.current = false; onClear && onClear(); };

  // QWERTY-style layout with digits on top row — 4 rows, finger-friendly
  const rows = [
    ['1','2','3','4','5','6','7','8','9','0'],
    ['q','w','e','r','t','y','u','i','o','p'],
    ['a','s','d','f','g','h','j','k','l'],
    ['z','x','c','v','b','n','m'],
  ];

  return (
    <div className={wrong ? 'shake' : ''}>
      {showPreview && (
        <div className="flex gap-2 justify-center mb-5" style={{ color }}>
          {Array.from({ length }).map((_, i) => (
            <div key={i} className="w-11 h-12 rounded-xl flex items-center justify-center font-display font-black text-2xl"
              style={{
                backgroundColor: i < word.length ? color : '#f5f5f4',
                color: i < word.length ? 'white' : '#d6d3d1',
                border: `2px solid ${i === word.length ? color : 'transparent'}`,
              }}>
              {i < word.length ? word[i].toUpperCase() : '·'}
            </div>
          ))}
        </div>
      )}
      <div className="max-w-md mx-auto space-y-1.5">
        {rows.map((row, ri) => (
          <div key={ri} className="flex gap-1.5 justify-center">
            {row.map((ch) => (
              <button key={ch} onClick={() => press(ch)} className="wordpad-btn" style={{ color: deep }}>

              </button>

                </button>
              </>
            )}
          </div>
        ))}
      </div>
    </div>
  );
}

const PinKeypad = WordPad;

/* ============================================================
   GATE (wraps kid PIN, grown-up PIN, admin password)
   ============================================================ */
function Gate({ kind, config, targetId, onCancel, onSuccess, saveConfig, onToast }) {
  if (kind === 'kid') {
    const kid = config.kids.find((k) => k.id === targetId);
    if (!kid) return null;
    return (
      <PinGate
        title={kid.name + "'s PIN"}
        emoji={kid.emoji}
        color={kid.primary}
        deep={kid.deep}
        soft={kid.soft}
        expectedHash={kid.pinHash}
        onCancel={onCancel}
        onSuccess={onSuccess}
      />
    );
  }
  if (kind === 'grownup') {
    const g = config.grownups.find((x) => x.id === targetId);
    if (!g) return null;
    return (
      <PinGate
        title={g.name + "'s PIN"}
        emoji={g.emoji}
        color={g.primary}
        deep={g.deep}
        soft={g.soft}
        expectedHash={g.pinHash}
        onCancel={onCancel}
        onSuccess={onSuccess}
      />
    );
  }
  if (kind === 'admin') {
    return (
      <AdminGate
        config={config}
        saveConfig={saveConfig}
        onCancel={onCancel}
        onSuccess={onSuccess}
        onToast={onToast}
      />
    );
  }
  return null;
}

function PinGate({ title, emoji, color, deep, soft, expectedHash, onCancel, onSuccess }) {
  const [error, setError] = useState(false);
  const [errorNonce, setErrorNonce] = useState(0);

  const onComplete = async (word) => {
    const h = await hashSecret(word);
    if (h === expectedHash) {
      onSuccess();
    } else {
      setError(true);
      setErrorNonce((n) => n + 1);
    }
  };

  return (
    <div className="fixed inset-0 bg-black/50 z-50 flex items-center justify-center p-4 bounce-in">
      <div className="bg-white rounded-3xl p-6 max-w-md w-full chunky-shadow relative" style={{ border: `3px solid ${color}` }}>
        <button onClick={onCancel} className="absolute top-3 right-3 w-8 h-8 rounded-full bg-stone-100 flex items-center justify-center">
          <X className="w-4 h-4" />
        </button>
        <div className="text-5xl text-center mb-2">{emoji}</div>
        <h3 className="font-display font-black text-2xl text-center mb-1" style={{ color: deep }}>{title}</h3>
        <p className="font-script text-xl text-center mb-5" style={{ color }}>
          {error ? 'nope, try again' : 'tap your 4-letter word or PIN'}
        </p>
        <WordPad key={errorNonce} color={color} deep={deep} soft={soft} onComplete={onComplete} error={error} onClear={() => setError(false)} />
      </div>
    </div>
  );
}

  // Nudge logic
  const loves = Object.entries(prefs.ratings || {}).filter(([, v]) => v === 'love').map(([k]) => k);

function CreateTab({ kid, config, prefs, saveCreation, updateCreation, deleteCreation }) {

  const [ingSelection, setIngSelection] = useState({});
  const [name, setName] = useState('');

  const creations = prefs.creations || [];
  const startNew = () => { setIngSelection({}); setName(''); setEditingId(null); setMode('build'); };
  const startEdit = (c) => {
    setIngSelection(JSON.parse(JSON.stringify(c.ingredients || {})));
    setName(c.name || '');
    setEditingId(c.id);
    setMode('build');
  };

  const toggle = (cat, id) => {
    setIngSelection((prev) => {
      const cur = prev[cat] || [];
      const next = cur.includes(id) ? cur.filter((x) => x !== id) : [...cur, id];
      return { ...prev, [cat]: next };
    });
  };

  const totalCount = Object.values(ingSelection).reduce((a, b) => a + b.length, 0);
  const groupsHit = Object.keys(ingSelection).filter((k) => (ingSelection[k] || []).length > 0).length;

  const commit = () => {
    if (totalCount === 0) return;
    const finalName = name.trim() || `${kid.name}'s ${['Creation','Masterpiece','Invention','Special'][Math.floor(Math.random() * 4)]}`;
    if (editingId) updateCreation(editingId, { name: finalName, ingredients: ingSelection });
    else saveCreation({ name: finalName, ingredients: ingSelection });
    setMode('list');
    setEditingId(null);
  };

  if (mode === 'build') {
    return (
      <div>
        <button onClick={() => { setMode('list'); setEditingId(null); }} className="font-body font-bold flex items-center gap-1.5 mb-3 text-sm" style={{ color: kid.deep }}>

                  const ing = (config.ingredients[cat] || []).find((x) => x.id === id);
                  return ing ? (
                    <span key={`${cat}-${id}`} className="rounded-full px-2 py-1 flex items-center gap-1" style={{ backgroundColor: kid.soft, color: kid.deep }}>

            </div>

          {earned} <span className="text-xl font-normal">/ {stamps.length}</span>
        </div>
        <div className="font-script text-xl mt-0.5" style={{ color: kid.primary }}>stamps collected</div>
        {streak >= 1 && (
          <div className="mt-2 inline-flex items-center gap-1.5 bg-white rounded-full px-3 py-1">
            <Flame className="w-4 h-4 text-red-500" />
            <span className="font-body font-bold text-sm" style={{ color: '#991b1b' }}>
              {streak} week streak!
            </span>
          </div>
        )}
      </div>
      {Object.entries(STAMP_CATS).map(([catId, meta]) => {
        const list = byCat[catId] || [];
        if (list.length === 0) return null;
        const earnedCount = list.filter((s) => s.earned).length;
        return (
          <section key={catId} className="mb-5">
            <div className="flex items-center gap-2 mb-2">
              <h3 className="font-display font-black text-lg" style={{ color: meta.color }}>{meta.label}</h3>
              <span className="font-body text-xs font-bold" style={{ color: meta.color, backgroundColor: meta.color + '22' }}>
                <span className="rounded-full px-2 py-0.5">{earnedCount}/{list.length}</span>
              </span>
            </div>
            <div className="grid grid-cols-2 md:grid-cols-3 gap-2">
              {list.map((s) => (
                <div key={s.id} className="sticker rounded-2xl p-3 text-center relative"
                  style={{
                    backgroundColor: s.earned ? 'white' : '#f5f5f4',
                    border: s.earned ? `3px dashed ${meta.color}` : '2px dashed #d6d3d1',
                    opacity: s.earned ? 1 : 0.7,
                  }}>
                  <div className="text-3xl mb-1" style={{ filter: s.earned ? 'none' : 'grayscale(100%)' }}>{s.emoji}</div>
                  <div className="font-display font-bold text-xs leading-tight" style={{ color: s.earned ? meta.color : '#78716c' }}>{s.label}</div>
                  {!s.earned && s.target > 1 && (
                    <div className="mt-1.5">
                      <div className="progress-bar">
                        <div className="progress-fill" style={{ width: `${(s.progress / s.target) * 100}%`, backgroundColor: meta.color }} />
                      </div>
                      <div className="font-body text-[10px] text-stone-500 mt-0.5">{s.progress}/{s.target}</div>
                    </div>
                  )}
                </div>
              ))}
            </div>
          </section>
        );
      })}
      <div className="text-center mt-5">
        <button onClick={() => { if (confirm('Reset all your picks?')) onReset(); }}
          className="font-body text-xs text-stone-400 underline hover:text-stone-600">
          start fresh (reset my picks)
        </button>
      </div>
    </div>
  );
}

/* ============================================================

function GrownupView({ grownup, config, grownupPrefs, kidPrefs, onRate, onClear, onBack }) {

  const feed = [];
  for (const kid of config.kids) {
    const p = kidPrefs[kid.id] || blankKidPrefs();
    for (const c of (p.creations || [])) {
      feed.push({ kid, creation: c });
    }
  }
  feed.sort((a, b) => (b.creation.createdAt || 0) - (a.creation.createdAt || 0));

  const ratedCount = Object.keys(grownupPrefs.creationRatings || {}).length;

  return (
    <div className="bounce-in">
      <button onClick={onBack} className="font-body font-bold flex items-center gap-1.5 mb-4 px-3 py-1.5 rounded-full" style={{ color: grownup.deep }}>
        <ArrowLeft className="w-5 h-5" /> everyone
      </button>

      <div className="rounded-3xl p-5 md:p-6 mb-5 relative overflow-hidden chunky-shadow" style={{ backgroundColor: grownup.soft }}>
        <div className="relative flex items-center gap-4">
          <div className="text-6xl md:text-7xl">{grownup.emoji}</div>
          <div className="flex-1">
            <h2 className="font-display font-black text-4xl md:text-5xl leading-none" style={{ color: grownup.deep }}>
              {grownup.name}'s feedback
            </h2>
            <p className="font-script text-2xl mt-1" style={{ color: grownup.primary }}>
              celebrate the kids' creations
            </p>
          </div>
        </div>
        <div className="relative mt-4 flex gap-2 flex-wrap">
          <Chip color="white" textColor={grownup.deep}>{ratedCount} rated</Chip>
          <Chip color="white" textColor={grownup.deep}>{feed.length} total creations</Chip>
        </div>
      </div>

      {feed.length === 0 ? (
        <div className="text-center py-10">
          <div className="text-6xl mb-3 float-slow">🍳</div>
          <p className="font-body text-stone-500">No creations yet. Check back after the kids get inventing!</p>
        </div>
      ) : (
        <div className="space-y-4">

            <GrownupCreationCard
              key={`${kid.id}-${creation.id}`}
              kid={kid}
              creation={creation}
              grownup={grownup}
              config={config}
              rating={grownupPrefs.creationRatings?.[`${kid.id}:${creation.id}`]}
              onRate={(patch) => onRate(kid.id, creation.id, patch)}

      )}

function GrownupCreationCard({ kid, creation, grownup, config, rating, onRate, onClear }) {
  const [noteDraft, setNoteDraft] = useState(rating?.comment || '');
  const [editingNote, setEditingNote] = useState(false);

  useEffect(() => { setNoteDraft(rating?.comment || ''); }, [rating?.comment]);

  const active = rating?.reaction;
  const saveNote = () => {
    onRate({ comment: noteDraft.trim() });
    setEditingNote(false);
  };

  const ingCount = Object.values(creation.ingredients || {}).reduce((a, b) => a + b.length, 0);

  return (
    <div className="sticker bg-white rounded-2xl p-4 relative" style={{ border: `3px solid ${kid.soft}` }}>
      <div className="flex items-center gap-2 mb-2">
        <div className="text-2xl">{kid.emoji}</div>
        <div className="flex-1 min-w-0">
          <div className="font-display font-black text-lg leading-tight" style={{ color: kid.deep }}>{creation.name}</div>
          <div className="font-script text-base leading-none" style={{ color: kid.primary }}>by {kid.name} · {ingCount} ingredient{ingCount === 1 ? '' : 's'}</div>
        </div>
      </div>
      <div className="flex flex-wrap gap-1.5 mb-3">
        {Object.entries(creation.ingredients || {}).flatMap(([cat, ids]) => ids.map((id) => {
          const ing = (config.ingredients[cat] || []).find((x) => x.id === id);
          return ing ? (
            <span key={`${cat}-${id}`} className="rounded-full px-2 py-0.5 flex items-center gap-1" style={{ backgroundColor: kid.soft, color: kid.deep }}>
              <span>{ing.emoji}</span><span className="font-body text-xs font-bold">{ing.name}</span>
            </span>
          ) : null;
        }))}
      </div>

      <div className="border-t-2 border-dashed border-stone-200 pt-3">
        <div className="font-body text-xs text-stone-500 uppercase tracking-wide font-bold mb-2">
          {grownup.name}'s reaction
        </div>
        <div className="flex gap-2 mb-3">
          {GROWNUP_REACTIONS.map((r) => (
            <button
              key={r.key}
              onClick={() => {
                if (active === r.key) onClear();
                else onRate({ reaction: r.key });
              }}
              className={`reaction-btn flex-1 rounded-xl py-2 px-1 flex flex-col items-center gap-0.5 ${active === r.key ? 'active' : ''}`}
              style={{
                backgroundColor: active === r.key ? r.color : '#f5f5f4',
                filter: active && active !== r.key ? 'grayscale(60%) opacity(0.6)' : 'none',
              }}
            >
              <span className="text-2xl">{r.emoji}</span>
              <span className="font-body font-bold text-[10px]" style={{ color: active === r.key ? 'white' : '#57534e' }}>{r.label}</span>
            </button>
          ))}
        </div>
        {!editingNote && !rating?.comment && (
          <button onClick={() => setEditingNote(true)} className="w-full font-body text-sm text-stone-500 italic text-center py-2 rounded-xl border-2 border-dashed border-stone-200 hover:bg-stone-50 flex items-center justify-center gap-2">
            <MessageCircle className="w-4 h-4" /> add a note
          </button>
        )}
        {!editingNote && rating?.comment && (
          <button onClick={() => setEditingNote(true)} className="w-full text-left rounded-xl px-3 py-2" style={{ backgroundColor: grownup.soft, color: grownup.deep }}>
            <div className="font-script text-lg">"{rating.comment}"</div>
          </button>
        )}
        {editingNote && (
          <div>
            <textarea value={noteDraft} onChange={(e) => setNoteDraft(e.target.value)} maxLength={140} rows={2}
              placeholder="e.g. yum! / needs more cheese"
              className="w-full font-body text-sm bg-stone-100 rounded-xl px-3 py-2 outline-none focus:bg-stone-200 resize-none" />
            <div className="flex gap-2 mt-2">
              <button onClick={() => { setEditingNote(false); setNoteDraft(rating?.comment || ''); }} className="flex-1 rounded-xl py-2 font-body font-bold text-sm bg-stone-100 text-stone-700">Cancel</button>
              <button onClick={saveNote} className="flex-1 rounded-xl py-2 font-body font-bold text-sm text-white" style={{ backgroundColor: grownup.primary }}>Save note</button>
            </div>
          </div>
        )}
      </div>
    </div>
  );
}

function AdminGate({ config, saveConfig, onCancel, onSuccess, onToast }) {
  const [error, setError] = useState(false);
  const [errorNonce, setErrorNonce] = useState(0);
  const [recoveryOpen, setRecoveryOpen] = useState(false);
  const [recoveryText, setRecoveryText] = useState('');

  const onComplete = async (word) => {
    const h = await hashSecret(word);
    if (h === config.adminPasswordHash) {
      onSuccess();
    } else {
      setError(true);
      setErrorNonce((n) => n + 1);
    }
  };

  const tryRecovery = () => {
    if (recoveryText.trim().toLowerCase() === ADMIN_RECOVERY_PHRASE) {
      saveConfig({ ...config, adminPasswordHash: null });
      onToast && onToast('🔓 Admin word cleared');
      onSuccess();
    } else {
      setError(true);
      setErrorNonce((n) => n + 1);
      setRecoveryText('');
    }
  };

  return (
    <div className="fixed inset-0 bg-black/50 z-50 flex items-center justify-center p-4 bounce-in">
      <div className="bg-white rounded-3xl p-6 max-w-md w-full chunky-shadow relative" style={{ border: '3px solid #44403c' }}>
        <button onClick={onCancel} className="absolute top-3 right-3 w-8 h-8 rounded-full bg-stone-100 flex items-center justify-center">
          <X className="w-4 h-4" />
        </button>
        <div className="text-5xl text-center mb-2">🔒</div>
        <h3 className="font-display font-black text-2xl text-center mb-1" style={{ color: '#44403c' }}>Grown-ups only</h3>
        <p className="font-script text-xl text-center mb-5 text-stone-500">
          {error ? 'nope, try again' : 'tap the grown-up word or PIN'}
        </p>
        <WordPad key={errorNonce} color="#44403c" deep="#1c1917" soft="#f5f5f4" onComplete={onComplete} error={error} onClear={() => setError(false)} />
        <div className="mt-4 text-center">
          {!recoveryOpen ? (
            <button onClick={() => { setRecoveryOpen(true); setError(false); }} className="font-body text-xs text-stone-400 underline hover:text-stone-600">
              forgot the word?
            </button>
          ) : (
            <div className="mt-3 pt-3 border-t-2 border-dashed border-stone-200">
              <div className="font-body text-xs text-stone-600 mb-2">Type the recovery phrase to clear the admin word:</div>
              <div className="flex gap-2">
                <input value={recoveryText} onChange={(e) => setRecoveryText(e.target.value)} placeholder="recovery phrase"
                  className="flex-1 font-body text-sm py-2 px-3 rounded-xl bg-stone-100 outline-none focus:bg-stone-200" />
                <button onClick={tryRecovery} className="rounded-xl px-3 font-body font-bold text-sm text-white" style={{ backgroundColor: '#44403c' }}>Go</button>
              </div>
            </div>
          )}
        </div>
      </div>
    </div>
  );
}

/* ============================================================
   ADMIN: OVERVIEW (kid-card dashboard + markdown export)
   ============================================================ */
function AdminOverview({ config, kidPrefs, grownupPrefs, currentWeek, onToast }) {
  const foods = allFoods(config);
  const foodById = Object.fromEntries(foods.map((f) => [f.id, f]));

  // Per-kid richer stats
  const perKid = config.kids.map((kid) => {
    const p = kidPrefs[kid.id] || blankKidPrefs();
    const loves = Object.entries(p.ratings || {}).filter(([, v]) => v === 'love').map(([id]) => foodById[id]).filter(Boolean);
    const likes = Object.entries(p.ratings || {}).filter(([, v]) => v === 'like').map(([id]) => foodById[id]).filter(Boolean);
    const nopes = Object.entries(p.ratings || {}).filter(([, v]) => v === 'nope').map(([id]) => foodById[id]).filter(Boolean);
    const braveYes = Object.entries(p.brave || {}).filter(([, v]) => v === 'yes').map(([id]) => (config.newFoods || []).find((f) => f.id === id)).filter(Boolean);
    const triedLoved = Object.entries(p.tried || {}).filter(([, v]) => v === 'loved').map(([id]) => (config.newFoods || []).find((f) => f.id === id)).filter(Boolean);
    const stamps = computeStamps(p, config, currentWeek);
    const earned = stamps.filter((s) => s.earned).length;
    const streak = computeStreak(p.weekActivity || {}, currentWeek);
    const weekPick = p.weeklyPick && p.weeklyPick.week === currentWeek ? foodById[p.weeklyPick.mealId] : null;
    const creations = (p.creations || []);
    const weekCreations = creations.filter((c) => c.week === currentWeek);
    return { kid, loves, likes, nopes, braveYes, triedLoved, earned, total: stamps.length, streak, weekPick, creations, weekCreations };
  });

  // Family-favourite meals (loved by multiple kids)
  const loveCount = {};
  for (const { loves } of perKid) {
    for (const f of loves) loveCount[f.id] = (loveCount[f.id] || 0) + 1;
  }
  const familyFaves = Object.entries(loveCount)
    .filter(([, n]) => n >= 2)
    .map(([id, n]) => ({ food: foodById[id], count: n }))
    .sort((a, b) => b.count - a.count);

  // Avoid list: anything all kids rated nope
  const allNope = config.kids.length > 0
    ? foods.filter((f) => config.kids.every((k) => (kidPrefs[k.id]?.ratings || {})[f.id] === 'nope'))
    : [];

  // Grown-up reactions on creations
  const allGrownupNotes = [];
  for (const kid of config.kids) {
    const p = kidPrefs[kid.id] || blankKidPrefs();
    for (const c of (p.creations || [])) {
      for (const g of config.grownups) {
        const gp = grownupPrefs[g.id] || blankGrownupPrefs();
        const r = gp.creationRatings?.[`${kid.id}:${c.id}`];
        if (r && (r.reaction || r.comment)) {
          allGrownupNotes.push({ kid, creation: c, grownup: g, r });
        }
      }
    }
  }

  const buildMarkdown = () => {
    let md = `# Family Food Club — Week ${currentWeek}\n\nGenerated ${new Date().toLocaleDateString()}\n\n`;
    if (familyFaves.length > 0) {
      md += `## 🌟 Family favourites (loved by 2+ kids)\n\n`;
      for (const f of familyFaves) md += `- ${f.food.emoji} **${f.food.name}** — loved by ${f.count}\n`;
      md += `\n`;
    }
    md += `## 📅 This week's dinner votes\n\n`;
    for (const { kid, weekPick } of perKid) {
      md += `- ${kid.emoji} **${kid.name}**: ${weekPick ? `${weekPick.emoji} ${weekPick.name}` : '_(no vote)_'}\n`;
    }
    md += `\n## 🗺️ Brave this week\n\n`;
    for (const { kid, braveYes, triedLoved } of perKid) {
      if (braveYes.length === 0 && triedLoved.length === 0) continue;
      md += `### ${kid.emoji} ${kid.name}\n`;
      if (braveYes.length) md += `Willing to try: ${braveYes.map((f) => `${f.emoji} ${f.name}`).join(', ')}\n`;
      if (triedLoved.length) md += `Actually loved: ${triedLoved.map((f) => `${f.emoji} ${f.name}`).join(', ')}\n`;
      md += `\n`;
    }
    md += `## 💖 What each kid loves\n\n`;
    for (const { kid, loves, nopes } of perKid) {
      md += `### ${kid.emoji} ${kid.name}\n`;
      md += loves.length ? `**Loves:** ${loves.map((f) => `${f.emoji} ${f.name}`).join(', ')}\n` : `_no loves yet_\n`;
      if (nopes.length) md += `**Nopes:** ${nopes.map((f) => `${f.emoji} ${f.name}`).join(', ')}\n`;
      md += `\n`;
    }
    if (allNope.length > 0) {
      md += `## 🙅 Avoid list (all kids said nope)\n\n`;
      for (const f of allNope) md += `- ${f.emoji} ${f.name}\n`;
      md += `\n`;
    }
    const creationsThisWeek = perKid.flatMap((x) => x.weekCreations.map((c) => ({ kid: x.kid, c })));
    if (creationsThisWeek.length > 0) {
      md += `## 👨‍🍳 New creations this week\n\n`;
      for (const { kid, c } of creationsThisWeek) {
        const ings = Object.entries(c.ingredients || {}).flatMap(([cat, ids]) => ids.map((id) => {
          const ing = (config.ingredients[cat] || []).find((x) => x.id === id);
          return ing ? `${ing.emoji} ${ing.name}` : '';
        })).filter(Boolean).join(', ');
        md += `- ${kid.emoji} **${kid.name}** — "${c.name}": ${ings}\n`;
      }
      md += `\n`;
    }
    if (allGrownupNotes.length > 0) {
      md += `## 📣 Grown-up reactions on creations\n\n`;
      for (const { kid, creation, grownup, r } of allGrownupNotes) {
        const rx = GROWNUP_REACTIONS.find((x) => x.key === r.reaction);
        md += `- ${grownup.emoji} **${grownup.name}** on ${kid.emoji} ${kid.name}'s "${creation.name}": ${rx ? rx.emoji : ''} ${r.comment ? `— "${r.comment}"` : ''}\n`;
      }
      md += `\n`;
    }
    md += `## 🏅 Stamps & streaks\n\n`;
    for (const { kid, earned, total, streak } of perKid) {
      md += `- ${kid.emoji} **${kid.name}**: ⭐ ${earned}/${total}${streak >= 1 ? ` · 🔥 ${streak}wk streak` : ''}\n`;
    }
    return md;
  };

  const copyMarkdown = async () => {
    try {
      await navigator.clipboard.writeText(buildMarkdown());
      onToast('📋 Copied to clipboard!');
    } catch (e) {
      onToast('❌ Copy failed — try downloading');
    }
  };
  const downloadMarkdown = () => {
    const blob = new Blob([buildMarkdown()], { type: 'text/markdown' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url; a.download = `family-food-club-${currentWeek}.md`;
    document.body.appendChild(a); a.click(); a.remove();
    setTimeout(() => URL.revokeObjectURL(url), 2000);
    onToast('⬇️ Download started');
  };

  return (
    <div>
      {/* Week header + export */}
      <div className="sticker bg-white rounded-2xl p-4 mb-4 chunky-shadow" style={{ border: '2px solid #44403c' }}>
        <div className="flex items-center justify-between flex-wrap gap-2">
          <div>
            <h3 className="font-display font-black text-xl text-stone-800">Week {currentWeek}</h3>
            <p className="font-body text-xs text-stone-500">At a glance. Export for shopping or sharing.</p>
          </div>
          <div className="flex gap-2">
            <button onClick={copyMarkdown} className="sticker rounded-full px-3 py-1.5 text-xs font-display font-bold bg-white text-stone-700" style={{ border: '2px solid #44403c' }}>📋 Copy</button>
            <button onClick={downloadMarkdown} className="sticker rounded-full px-3 py-1.5 text-xs font-display font-bold text-white" style={{ backgroundColor: '#44403c' }}>⬇️ Download</button>
          </div>
        </div>
      </div>

      {/* Family favourites strip */}
      {familyFaves.length > 0 && (
        <section className="mb-5">
          <h4 className="font-display font-black text-lg mb-2">🌟 Family favourites</h4>
          <div className="flex flex-wrap gap-2">
            {familyFaves.map(({ food, count }) => (
              <div key={food.id} className="rounded-full bg-white px-3 py-1.5 flex items-center gap-1.5 chunky-shadow" style={{ border: '2px solid #fbbf24' }}>
                <span className="text-lg">{food.emoji}</span>
                <span className="font-body font-bold text-sm">{food.name}</span>
                <span className="font-display font-black text-xs text-amber-600">×{count}</span>
              </div>
            ))}
          </div>
        </section>
      )}

      {/* Kid cards — the main event */}
      <section className="mb-5">
        <h4 className="font-display font-black text-lg mb-3">👧 Per-kid overview</h4>
        <div className="grid gap-4 md:grid-cols-2">
          {perKid.map((k) => <KidOverviewCard key={k.kid.id} {...k} />)}
        </div>
      </section>

      {/* Avoid list */}
      {allNope.length > 0 && (
        <section className="mb-5">
          <h4 className="font-display font-black text-lg mb-2 text-stone-700">🙅 Avoid list</h4>
          <p className="font-body text-xs text-stone-500 mb-2">All kids said nope</p>
          <div className="flex flex-wrap gap-2">
            {allNope.map((f) => (
              <div key={f.id} className="rounded-full px-3 py-1.5 flex items-center gap-1.5" style={{ backgroundColor: '#f5f5f4', color: '#57534e' }}>
                <span>{f.emoji}</span><span className="font-body font-bold text-sm line-through">{f.name}</span>
              </div>
            ))}
          </div>
        </section>
      )}

      {/* Grown-up notes */}
      {allGrownupNotes.length > 0 && (
        <section className="mb-4">
          <h4 className="font-display font-black text-lg mb-2">📣 Grown-up reactions</h4>
          <div className="space-y-2">
            {allGrownupNotes.slice(0, 12).map(({ kid, creation, grownup, r }, i) => {
              const rx = GROWNUP_REACTIONS.find((x) => x.key === r.reaction);
              return (
                <div key={i} className="bg-white rounded-2xl p-3 flex items-start gap-3" style={{ border: `2px solid ${grownup.soft}` }}>
                  <div className="text-2xl">{grownup.emoji}</div>
                  <div className="flex-1">
                    <div className="font-body text-sm">
                      <span className="font-bold" style={{ color: grownup.deep }}>{grownup.name}</span>{' '}
                      on {kid.emoji} <span className="font-bold" style={{ color: kid.deep }}>{kid.name}</span>'s "{creation.name}"
                    </div>
                    <div className="mt-1 flex items-center gap-2">
                      {rx && <span className="text-xl">{rx.emoji}</span>}
                      {r.comment && <span className="font-script text-lg" style={{ color: grownup.primary }}>"{r.comment}"</span>}
                    </div>
                  </div>
                </div>
              );
            })}
          </div>
        </section>
      )}
    </div>
  );
}

          <div className="flex-1 min-w-0">
            <div className="font-display font-black text-xl leading-tight" style={{ color: kid.deep }}>{kid.name}</div>
            <p className="font-script text-base leading-none" style={{ color: kid.primary }}>{kid.tagline}</p>
          </div>

        <div className="flex flex-wrap gap-1.5 mb-3">

          {streak >= 1 && <Chip color="#fee2e2" textColor="#991b1b">🔥 {streak}wk</Chip>}
          <Chip color="#fce7f3" textColor="#9f1239">💖 {loves.length} love{loves.length === 1 ? '' : 's'}</Chip>
          {nopes.length > 0 && <Chip color="#f5f5f4" textColor="#57534e">🙅 {nopes.length} nope{nopes.length === 1 ? '' : 's'}</Chip>}
        </div>
        {/* Dinner vote */}
        <div className="mb-3 rounded-xl px-3 py-2" style={{ backgroundColor: kid.soft }}>
          <div className="font-body text-[10px] uppercase tracking-wide font-bold" style={{ color: kid.deep, opacity: 0.7 }}>This week's dinner vote</div>
          {weekPick ? (
            <div className="font-body font-bold text-sm mt-0.5" style={{ color: kid.deep }}>{weekPick.emoji} {weekPick.name}</div>

            <div className="font-body italic text-sm text-stone-400 mt-0.5">no vote yet</div>
          )}
        </div>
        {/* Loves */}
        <OverviewList
          title="Loves"
          emoji="💖"
          items={loves}
          empty="No loves yet"
          color={kid.deep}
          soft={kid.soft}
          limit={8}
        />
        {/* Nopes */}
        {nopes.length > 0 && (
          <OverviewList
            title="Nopes"
            emoji="🙅"
            items={nopes}
            color="#57534e"
            soft="#f5f5f4"
            limit={6}
            strikethrough
          />
        )}
        {/* Brave */}
        {(braveYes.length > 0 || triedLoved.length > 0) && (
          <div className="mt-2">
            {braveYes.length > 0 && (
              <OverviewList title="Willing to try" emoji="🗺️" items={braveYes} color="#92400e" soft="#fef3c7" limit={5} />
            )}
            {triedLoved.length > 0 && (
              <OverviewList title="Actually loved" emoji="👅💖" items={triedLoved} color="#9f1239" soft="#fce7f3" limit={5} />
            )}
          </div>

        {/* Creations */}
        {creations.length > 0 && (
          <div className="mt-3 pt-3 border-t-2 border-dashed border-stone-200">
            <div className="font-body text-[10px] uppercase tracking-wide font-bold mb-1.5" style={{ color: kid.deep, opacity: 0.7 }}>
              👨‍🍳 Creations ({creations.length}{weekCreations.length ? ` · ${weekCreations.length} this week` : ''})
            </div>
            <div className="font-body text-xs text-stone-600">
              {creations.slice(-3).reverse().map((c, i, arr) => (
                <span key={c.id}>
                  <span className="font-bold" style={{ color: kid.deep }}>{c.name}</span>
                  {i < arr.length - 1 && <span className="text-stone-400"> · </span>}
                </span>
              ))}
              {creations.length > 3 && <span className="text-stone-400 italic"> +{creations.length - 3} more</span>}
            </div>
          </div>
        )}
      </div>
    </div>
  );
}

function OverviewList({ title, emoji, items, color, soft, limit = 8, strikethrough = false, empty }) {
  if (!items || items.length === 0) {
    if (!empty) return null;
    return (
      <div className="mt-2">
        <div className="font-body text-[10px] uppercase tracking-wide font-bold mb-1" style={{ color, opacity: 0.7 }}>{emoji} {title}</div>
        <div className="font-body italic text-xs text-stone-400">{empty}</div>
      </div>
    );
  }
  const shown = items.slice(0, limit);
  const rest = items.length - shown.length;
  return (
    <div className="mt-2">
      <div className="font-body text-[10px] uppercase tracking-wide font-bold mb-1" style={{ color, opacity: 0.7 }}>{emoji} {title}</div>
      <div className="flex flex-wrap gap-1">
        {shown.map((f) => (
          <span key={f.id} className="rounded-full px-2 py-0.5 flex items-center gap-1" style={{ backgroundColor: soft, color }}>
            <span>{f.emoji}</span>
            <span className={`font-body text-xs font-bold ${strikethrough ? 'line-through' : ''}`}>{f.name}</span>
          </span>
        ))}
        {rest > 0 && <span className="font-body text-xs italic text-stone-400 self-center">+{rest} more</span>}
      </div>
    </div>
  );
}

function AdminProfiles({ config, saveConfig, setDialog, onToast }) {
  const delProfile = (who, id) => {
    if (!confirm('Delete this profile? Their data will be kept but no longer visible.')) return;
    const listKey = who === 'kid' ? 'kids' : 'grownups';
    saveConfig({ ...config, [listKey]: (config[listKey] || []).filter((p) => p.id !== id) });
  };
  const clearSecret = (who, id) => {
    if (!confirm('Remove this secret word? They can switch straight in without one.')) return;
    const listKey = who === 'kid' ? 'kids' : 'grownups';
    const list = (config[listKey] || []).map((p) => p.id === id ? { ...p, pinHash: null } : p);
    saveConfig({ ...config, [listKey]: list });
    onToast('🔓 Secret word removed');
  };
  const clearAdminSecret = () => {
    if (!confirm('Remove the admin secret word? Grown-up admin will open without one.')) return;
    saveConfig({ ...config, adminPasswordHash: null });
    onToast('🔓 Admin secret removed');
  };

  const renderProfile = (profile, who) => (
    <div key={profile.id} className="bg-white rounded-2xl p-3 flex items-center gap-3" style={{ border: `2px solid ${profile.soft}` }}>
      <div className="text-3xl">{profile.emoji}</div>
      <div className="flex-1 min-w-0">
        <div className="font-display font-black text-base leading-tight" style={{ color: profile.deep }}>{profile.name}</div>
        {profile.tagline && <div className="font-script text-base" style={{ color: profile.primary }}>{profile.tagline}</div>}
        <div className="flex items-center gap-1.5 mt-0.5">
          {profile.pinHash ? (
            <span className="text-[10px] font-bold bg-emerald-100 text-emerald-700 rounded-full px-1.5 py-0.5 flex items-center gap-1">
              <Lock className="w-2.5 h-2.5" /> secret set
            </span>
          ) : (
            <span className="text-[10px] font-bold bg-stone-100 text-stone-500 rounded-full px-1.5 py-0.5">no secret (optional)</span>
          )}
        </div>
      </div>
      <div className="flex flex-col gap-1">
        <div className="flex gap-1">
          <button onClick={() => setDialog({ kind: 'setpin', payload: { who, profileId: profile.id, name: profile.name, emoji: profile.emoji, color: profile.primary, deep: profile.deep, soft: profile.soft } })}
            className="w-8 h-8 rounded-full bg-emerald-100 flex items-center justify-center" title={profile.pinHash ? 'Change secret word' : 'Set secret word'}>
            <KeyRound className="w-4 h-4 text-emerald-700" />
          </button>
          {profile.pinHash && (
            <button onClick={() => clearSecret(who, profile.id)} className="w-8 h-8 rounded-full bg-stone-100 flex items-center justify-center" title="Remove secret word">
              <Unlock className="w-4 h-4 text-stone-500" />
            </button>
          )}
        </div>
        <div className="flex gap-1">
          <button onClick={() => setDialog({ kind: 'profile', payload: { who, profile, isNew: false } })} className="w-8 h-8 rounded-full bg-stone-100 flex items-center justify-center">
            <Edit3 className="w-4 h-4 text-stone-500" />
          </button>
          <button onClick={() => delProfile(who, profile.id)} className="w-8 h-8 rounded-full bg-stone-100 flex items-center justify-center">
            <Trash2 className="w-4 h-4 text-stone-500" />
          </button>
        </div>
      </div>
    </div>
  );

  return (
    <div>
      <div className="bg-amber-50 rounded-2xl p-3 mb-4 text-sm" style={{ border: '2px dashed #f59e0b' }}>
        <div className="font-display font-bold text-amber-800 mb-1">🔑 Secrets are optional</div>
        <p className="font-body text-amber-900 text-xs leading-snug">
          Anyone without a secret goes straight in — no gate, just tap their card. If you do want one, it can be a 4-letter word or a 4-digit PIN.
        </p>
      </div>

      <section className="mb-5">
        <div className="flex items-center justify-between mb-2">
          <h3 className="font-display font-black text-xl flex items-center gap-2">👧 Kids</h3>
          <button onClick={() => setDialog({ kind: 'profile', payload: { who: 'kid', isNew: true, profile: {} } })}
            className="sticker rounded-full px-3 py-1.5 font-display font-bold text-xs text-white flex items-center gap-1" style={{ backgroundColor: '#059669' }}>
            <UserPlus className="w-3.5 h-3.5" /> Add kid
          </button>
        </div>
        <div className="space-y-2">
          {config.kids.map((k) => renderProfile(k, 'kid'))}
          {config.kids.length === 0 && <Empty>No kids yet</Empty>}
        </div>
      </section>

      <section className="mb-5">
        <div className="flex items-center justify-between mb-2">
          <h3 className="font-display font-black text-xl flex items-center gap-2">👩‍👨 Grown-ups</h3>
          <button onClick={() => setDialog({ kind: 'profile', payload: { who: 'grownup', isNew: true, profile: {} } })}
            className="sticker rounded-full px-3 py-1.5 font-display font-bold text-xs text-white flex items-center gap-1" style={{ backgroundColor: '#059669' }}>
            <UserPlus className="w-3.5 h-3.5" /> Add grown-up
          </button>
        </div>

/* ============================================================
   ADMIN: CREATIONS (kid creations list + promote to menu)
   ============================================================ */
function AdminCreations({ config, kidPrefs, grownupPrefs, saveConfig, setDialog }) {
  const all = [];
  for (const kid of config.kids) {
    const p = kidPrefs[kid.id] || blankKidPrefs();
    for (const c of (p.creations || [])) all.push({ kid, creation: c });
  }
  all.sort((a, b) => (b.creation.createdAt || 0) - (a.creation.createdAt || 0));

  return (
    <div>
      <h3 className="font-display font-black text-xl mb-3">Kid creations</h3>
      {all.length === 0 ? <Empty>No creations yet.</Empty> : (
        <div className="space-y-3">
          {all.map(({ kid, creation }) => {
            const alreadyPromoted = allFoods(config).some((f) => f.createdBy === kid.id && f.name === creation.name);
            const reactions = [];
            for (const g of config.grownups) {
              const gp = grownupPrefs[g.id] || blankGrownupPrefs();
              const r = gp.creationRatings?.[`${kid.id}:${creation.id}`];
              if (r) reactions.push({ g, r });
            }
            return (
              <div key={`${kid.id}-${creation.id}`} className="bg-white rounded-2xl p-3" style={{ border: `2px solid ${kid.soft}` }}>
                <div className="flex items-center gap-2 mb-2">
                  <div className="text-2xl">{kid.emoji}</div>
                  <div className="flex-1 min-w-0">
                    <div className="font-display font-black text-base leading-tight" style={{ color: kid.deep }}>{creation.name}</div>
                    <div className="font-script text-base leading-none" style={{ color: kid.primary }}>by {kid.name}</div>
                  </div>
                </div>
                <div className="flex flex-wrap gap-1.5 mb-2">
                  {Object.entries(creation.ingredients || {}).flatMap(([cat, ids]) => ids.map((id) => {
                    const ing = (config.ingredients[cat] || []).find((x) => x.id === id);
                    return ing ? (
                      <span key={`${cat}-${id}`} className="rounded-full px-2 py-0.5 flex items-center gap-1" style={{ backgroundColor: kid.soft, color: kid.deep }}>
                        <span>{ing.emoji}</span><span className="font-body text-xs font-bold">{ing.name}</span>
                      </span>
                    ) : null;
                  }))}
                </div>
                {reactions.length > 0 && (
                  <div className="mb-2 flex flex-wrap gap-1">
                    {reactions.map(({ g, r }, i) => {
                      const rx = GROWNUP_REACTIONS.find((x) => x.key === r.reaction);
                      return (
                        <span key={i} className="rounded-full px-2 py-0.5 text-xs flex items-center gap-1" style={{ backgroundColor: g.soft, color: g.deep }}>
                          {g.emoji} {rx ? rx.emoji : ''} {r.comment ? `"${r.comment.slice(0, 28)}${r.comment.length > 28 ? '…' : ''}"` : ''}
                        </span>
                      );
                    })}
                  </div>
                )}
                <button onClick={() => setDialog({ kind: 'promote', payload: { kid, creation } })}
                  disabled={alreadyPromoted}
                  className="sticker w-full rounded-xl py-2 font-display font-bold text-sm flex items-center justify-center gap-2"
                  style={{ backgroundColor: alreadyPromoted ? '#d6d3d1' : '#fbbf24', color: alreadyPromoted ? '#78716c' : '#78350f' }}>
                  {alreadyPromoted ? '✓ on the menu' : <><Plus className="w-4 h-4" /> Add to menu</>}
                </button>
              </div>
            );
          })}
        </div>
      )}
    </div>
  );
}

function SetSecretDialog({ payload, onCancel, onSave }) {
  const { name, emoji, color, deep, soft } = payload;
  const [step, setStep] = useState('first');
  const [firstWord, setFirstWord] = useState('');
  const [error, setError] = useState(false);
  const [errorNonce, setErrorNonce] = useState(0);

  const onFirstDone = (word) => {
    setFirstWord(word);
    setStep('confirm');
  };
  const onConfirmDone = (word) => {
    if (word !== firstWord) {
      setError(true);
      setErrorNonce((n) => n + 1);
      setTimeout(() => { setStep('first'); setFirstWord(''); setError(false); }, 700);
      return;
    }
    onSave(word);
  };

  return (
    <div className="fixed inset-0 bg-black/50 z-50 flex items-center justify-center p-4 bounce-in">
      <div className="bg-white rounded-3xl p-6 max-w-md w-full chunky-shadow relative" style={{ border: `3px solid ${color}` }}>
        <button onClick={onCancel} className="absolute top-3 right-3 w-8 h-8 rounded-full bg-stone-100 flex items-center justify-center">
          <X className="w-4 h-4" />
        </button>
        <div className="text-5xl text-center mb-2">{emoji}</div>
        <h3 className="font-display font-black text-2xl text-center mb-1" style={{ color: deep }}>
          {step === 'first' ? `Set ${name}'s secret` : 'Tap it again'}
        </h3>
        <p className="font-script text-xl text-center mb-5" style={{ color }}>
          {step === 'first' ? 'pick a 4-letter word or 4-digit PIN' : error ? "didn't match — start over" : 'just to confirm'}
        </p>
        <WordPad
          key={`${step}-${errorNonce}`}
          color={color} deep={deep} soft={soft}
          onComplete={step === 'first' ? onFirstDone : onConfirmDone}
          error={error}
          onClear={() => setError(false)}
        />
      </div>
    </div>
  );
}
